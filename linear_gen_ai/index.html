<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Enterprise</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen overflow-hidden flex">

    <!-- AUTHENTICATION LAYER -->
    <div id="login-screen" class="fixed inset-0 bg-[#0c0d0e] z-[100] flex items-center justify-center p-4">
        <div class="w-full max-w-sm flex flex-col items-center">
            <div class="w-12 h-12 bg-white rounded-xl mb-10 flex items-center justify-center shadow-2xl">
                <div class="w-4 h-4 bg-black rounded-full"></div>
            </div>
            <div id="auth-login" class="w-full p-8 bg-[#161718] border border-[#25262b] rounded-2xl shadow-2xl space-y-6">
                <div class="text-center">
                    <h1 class="text-xl font-bold tracking-tight">Linear Enterprise</h1>
                    <p class="text-[11px] text-gray-500 uppercase font-bold tracking-widest mt-1">Workspace Login</p>
                </div>
                <div class="space-y-4">
                    <input type="email" id="login-email" value="admin@linear.mini" class="w-full bg-[#0c0d0e] border border-[#25262b] rounded-lg px-4 py-2.5 text-sm outline-none focus:border-indigo-500 transition">
                    <input type="password" id="login-password" value="password" class="w-full bg-[#0c0d0e] border border-[#25262b] rounded-lg px-4 py-2.5 text-sm outline-none focus:border-indigo-500 transition">
                    <button onclick="handleLogin()" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-gray-200 transition">Sign In</button>
                </div>
            </div>
            <!-- Recovery hidden for focus -->
            <div id="auth-recovery" class="hidden"></div>
        </div>
    </div>

    <!-- MAIN APP STRUCTURE -->
    <div id="app-workspace" class="hidden flex w-full h-full fade-in">
        <!-- Sidebar -->
        <aside class="w-64 border-r border-[#25262b] flex flex-col bg-[#0c0d0e] shrink-0">
            <div class="h-14 flex items-center px-6 border-b border-[#25262b]/30">
                <div class="w-4 h-4 bg-white rounded-sm mr-3"></div>
                <span class="text-xs font-bold uppercase tracking-widest text-gray-100">Mini Enterprise</span>
            </div>
            <div class="flex-1 overflow-y-auto px-3 py-6 space-y-7 custom-scrollbar" id="sidebar-content">
                <!-- Navigation Items -->
                <div>
                    <div class="text-[10px] font-bold text-gray-600 uppercase tracking-widest px-3 mb-2">Personal</div>
                    <button onclick="setView('inbox')" class="nav-link w-full flex items-center space-x-3 px-3 py-1.5 rounded-md text-xs text-gray-500 transition" id="nav-inbox"><i data-lucide="bell" class="w-3.5 h-3.5"></i> <span>Inbox</span></button>
                    <button onclick="setView('my-issues')" class="nav-link w-full flex items-center space-x-3 px-3 py-1.5 rounded-md text-xs text-gray-500 transition" id="nav-my-issues"><i data-lucide="user" class="w-3.5 h-3.5"></i> <span>My Issues</span></button>
                </div>
                <div>
                    <div class="text-[10px] font-bold text-gray-600 uppercase tracking-widest px-3 mb-2">Workforce</div>
                    <button onclick="setView('issues')" class="nav-link w-full flex items-center space-x-3 px-3 py-1.5 rounded-md text-xs text-gray-500 transition" id="nav-issues"><i data-lucide="layers" class="w-3.5 h-3.5"></i> <span>Issues</span></button>
                    <button onclick="setView('board')" class="nav-link w-full flex items-center space-x-3 px-3 py-1.5 rounded-md text-xs text-gray-500 transition" id="nav-board"><i data-lucide="layout-grid" class="w-3.5 h-3.5"></i> <span>Board</span></button>
                </div>
            </div>
            <div class="border-t border-[#25262b] p-4"><button onclick="handleLogout()" class="text-xs text-gray-500 hover:text-red-500 transition">Logout</button></div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col bg-[#0c0d0e] min-w-0 relative">
            <header class="h-14 border-b border-[#25262b] flex items-center justify-between px-8 bg-[#0c0d0e]/50 backdrop-blur-xl shrink-0">
                <div class="flex items-center space-x-4 text-xs text-gray-500">
                    <span id="breadcrumb-category">Workspace</span>
                    <i data-lucide="chevron-right" class="w-3 h-3 text-gray-700"></i>
                    <span id="breadcrumb-view" class="text-white font-semibold tracking-tight">Issues</span>
                </div>
                <div class="flex items-center space-x-3">
                    <div class="flex items-center space-x-1 pr-3 border-r border-[#25262b]">
                        <button class="btn-ghost p-1.5"><i data-lucide="share-2" class="w-3.5 h-3.5"></i></button>
                        <button class="btn-ghost p-1.5"><i data-lucide="more-horizontal" class="w-3.5 h-3.5"></i></button>
                    </div>
                    <button onclick="openModal()" class="bg-white text-black text-[11px] px-4 py-1.5 rounded font-bold hover:bg-gray-100 transition shadow-lg">+ New Issue</button>
                </div>
            </header>

            <!-- RIGHT SIDE MENU OPTIONS BAR -->
            <div id="options-bar" class="h-10 border-b border-[#25262b] flex items-center px-4 justify-between bg-[#0c0d0e]/30 shrink-0">
                <div class="flex items-center flex-1 px-4 text-xs text-gray-500 group">
                    <i data-lucide="search" class="w-3.5 h-3.5 mr-3 group-focus-within:text-indigo-500 transition"></i>
                    <input type="text" id="global-search" placeholder="Search or filter..." class="bg-transparent border-none outline-none w-full text-gray-200 placeholder-gray-800">
                </div>
                
                <!-- Fixed Menu Options on the Right -->
                <div class="flex items-center space-x-1">
                    <button class="btn-ghost flex items-center space-x-1.5 px-2 py-1">
                        <i data-lucide="filter" class="w-3 h-3"></i>
                        <span class="text-[11px]">Filter</span>
                    </button>
                    <button class="btn-ghost flex items-center space-x-1.5 px-2 py-1">
                        <i data-lucide="sort-asc" class="w-3 h-3"></i>
                        <span class="text-[11px]">Sort</span>
                    </button>
                    <button class="btn-ghost flex items-center space-x-1.5 px-2 py-1">
                        <i data-lucide="rows" class="w-3 h-3"></i>
                        <span class="text-[11px]">Group</span>
                    </button>
                    <div class="w-px h-4 bg-[#25262b] mx-1"></div>
                    <button class="btn-ghost flex items-center space-x-1.5 px-2 py-1 text-indigo-400">
                        <i data-lucide="layout-template" class="w-3 h-3"></i>
                        <span class="text-[11px]">Display</span>
                    </button>
                </div>
            </div>

            <div id="content-area" class="flex-1 overflow-auto custom-scrollbar"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
